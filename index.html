<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio avec Modale Galerie</title>
<style>
  /* Styles globaux */
  body {
    font-family: Arial, sans-serif;
    margin: 0; padding: 0;
    background: #f4f4f4;
    color: #333;
  }
  .projets-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 40px auto;
  }
  .projet {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: transform 0.3s ease;
  }
  .projet:hover {
    transform: translateY(-5px);
  }
  .projet img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
  }
  .projet-info {
    margin-top: 15px;
  }
  /* MODALE */
  .modal {
    display: none; /* cachée par défaut */
    position: fixed;
    top: 0; left: 0; right:0; bottom:0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal.active {
    display: flex;
  }
  .modal-content {
    position: relative;
    max-width: 90%;
    max-height: 90%;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  .modal-content img {
    display: block;
    max-width: 100%;
    max-height: 80vh;
    margin: auto;
  }
  /* Bouton fermer */
  .modal-close {
    position: absolute;
    top: 10px; right: 15px;
    font-size: 30px;
    color: #333;
    cursor: pointer;
    user-select: none;
  }
  /* Flèches navigation */
  .modal-prev,
  .modal-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 50px;
    color: rgba(0,0,0,0.6);
    cursor: pointer;
    user-select: none;
    padding: 10px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
  }
  .modal-prev:hover,
  .modal-next:hover {
    background: rgba(255,255,255,1);
  }
  .modal-prev {
    left: 10px;
  }
  .modal-next {
    right: 10px;
  }
</style>
</head>
<body>

<h1 style="text-align:center; margin-top: 20px;">Mes Projets</h1>
<div class="projets-container">

  <!-- Projet normal -->
  <div class="projet">
    <img src="image_source_portfolio/Python_excel_dashboard.png" alt="SIRETisation automatisée" />
    <div class="projet-info">
      <h3>SIRETisation automatisée (API INSEE)</h3>
      <p>Technos : Python, Excel, API INSEE</p>
    </div>
  </div>

  <!-- Projet avec modale -->
  <div class="projet" id="projet-bi">
    <img src="image_source_portfolio/Power_BI_Dashboard_1.png" alt="Suivi boîte mail générique" />
    <div class="projet-info">
      <h3>Suivi boîte mail générique (Power Query + Power BI)</h3>
      <p>Technos : Excel, Power BI</p>
    </div>
  </div>

</div>

<!-- MODALE -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="modal-close" id="modal-close">&times;</span>
    <span class="modal-prev" id="modal-prev">&#10094;</span>
    <span class="modal-next" id="modal-next">&#10095;</span>
    <img id="modal-image" src="" alt="Image du projet" />
  </div>
</div>

<script>
  const modal = document.getElementById('modal');
  const modalImage = document.getElementById('modal-image');
  const closeBtn = document.getElementById('modal-close');
  const prevBtn = document.getElementById('modal-prev');
  const nextBtn = document.getElementById('modal-next');
  const projetBi = document.getElementById('projet-bi');

  // Liste des images à afficher dans la modale
  const images = [
    'image_source_portfolio/power bi.png',
    'image_source_portfolio/details_assitantes.png',
    'image_source_portfolio/mail3.png'
  ];

  let currentIndex = 0;

  // Ouvrir la modale et afficher la première image
  projetBi.addEventListener('click', () => {
    currentIndex = 0;
    modalImage.src = images[currentIndex];
    modal.classList.add('active');
  });

  // Fermer la modale
  closeBtn.addEventListener('click', () => {
    modal.classList.remove('active');
  });

  // Naviguer vers l’image précédente
  prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    modalImage.src = images[currentIndex];
  });

  // Naviguer vers l’image suivante
  nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % images.length;
    modalImage.src = images[currentIndex];
  });

  // Fermer la modale en cliquant en dehors de l’image
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.classList.remove('active');
    }
  });

  // Navigation clavier (facultatif)
  window.addEventListener('keydown', (e) => {
    if (!modal.classList.contains('active')) return;
    if (e.key === 'ArrowLeft') {
      prevBtn.click();
    } else if (e.key === 'ArrowRight') {
      nextBtn.click();
    } else if (e.key === 'Escape') {
      closeBtn.click();
    }
  });
</script>

</body>
</html>
